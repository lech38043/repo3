name: Deploy Database

on:
  push:
    branches:
      - master

env:
  SQL_SERVER: ${{ secrets.SQL_SERVER }}
  SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
  SQL_ADMIN: ${{ secrets.SQL_ADMIN_LOGIN }}
  SQL_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}

jobs:
  deploy-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
        
      - name: Generate SQL files
        run: python database/gen_sql.py

      - name: Run 001.sql
        uses: azure/sql-action@v2
        with:
          connection-string: Server=tcp:${{ env.SQL_SERVER }},1433;Database=${{ env.SQL_DATABASE }};User ID=${{ env.SQL_ADMIN }};Password=${{ env.SQL_PASSWORD }};Encrypt=true;
          path: database/001_create_table.sql