name: Deploy Database

on:
  push:
    branches:
      - master

env:
  SQL_SERVER: ${{ secrets.SQL_SERVER }}
  SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
  SQL_ADMIN: ${{ secrets.SQL_ADMIN_LOGIN }}
  SQL_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}

jobs:
  deploy-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Run SQL scripts
        uses: mcr.microsoft.com/azure-sql-action@v1
        with:
          server-name: ${{ env.SQL_SERVER }}
          database-name: ${{ env.SQL_DATABASE }}
          username: ${{ env.SQL_ADMIN }}
          password: ${{ env.SQL_PASSWORD }}
          script-path: database/